name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-node:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm tsc --noEmit
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  rust-checks:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-full:latest
    steps:
      - uses: actions/checkout@v6
      - name: Download SWORD modules
        run: |
          gh release download v1.0.0 --repo spearssoftware/biblemarker-assets --dir src-tauri/resources --pattern "sword-*.zip"
        env:
          GH_TOKEN: ${{ secrets.BIBLEMARKER_ASSETS_TOKEN }}
      - name: Check
        run: cargo check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: Format
        run: cargo fmt --check
        working-directory: src-tauri
