name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: [self-hosted, linux, biblemarker]
    container:
      image: ${{ vars.GITEA_REGISTRY }}/biblemarker-ci-node:latest
      credentials:
        username: ${{ secrets.GITEA_REGISTRY_USER }}
        password: ${{ secrets.GITEA_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm tsc --noEmit
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  rust-checks:
    runs-on: [self-hosted, linux, biblemarker]
    container:
      image: ${{ vars.GITEA_REGISTRY }}/biblemarker-ci-full:latest
      credentials:
        username: ${{ secrets.GITEA_REGISTRY_USER }}
        password: ${{ secrets.GITEA_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check
        run: cargo check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: Format
        run: cargo fmt --check
        working-directory: src-tauri
