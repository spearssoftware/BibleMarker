name: regenerate-flatpak-sources

# Auto-regenerates flatpak/cargo-sources.json and flatpak/node-sources.json
# whenever lockfiles change. Flathub blocks network access during build, so
# every cargo crate and npm package needs to be vendored with sha256 hashes.
# These files do that.
#
# Triggered by:
#   - Manual dispatch (e.g. for the initial run)
#   - Push to main affecting src-tauri/Cargo.lock or pnpm-lock.yaml
#     (catches dependabot merges, deliberate dep bumps, etc.)
#
# On change, opens a PR titled "chore(flatpak): regenerate vendored
# dependency sources". Merging that PR keeps the Flatpak build buildable.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src-tauri/Cargo.lock'
      - 'pnpm-lock.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Clone flatpak-builder-tools
        run: |
          git clone --depth=1 https://github.com/flatpak/flatpak-builder-tools.git /tmp/fbt

      - name: Install generator deps
        run: |
          pip install -r /tmp/fbt/cargo/requirements.txt
          pip install -r /tmp/fbt/node/requirements.txt

      - name: Generate cargo-sources.json
        run: |
          python3 /tmp/fbt/cargo/flatpak-cargo-generator.py \
            src-tauri/Cargo.lock \
            -o flatpak/cargo-sources.json

      - name: Synthesize package-lock.json from package.json
        # We use pnpm for development but flatpak-node-generator's pnpm support
        # is partial. Synthesize an npm package-lock.json so the generator can
        # produce node-sources.json that npm install --offline can consume
        # inside the Flatpak build sandbox. Local dev workflow continues to use
        # pnpm; this lockfile is throwaway.
        run: |
          rm -rf node_modules
          npm install --package-lock-only --no-audit --no-fund

      - name: Generate node-sources.json
        run: |
          python3 /tmp/fbt/node/flatpak-node-generator.py npm \
            package-lock.json \
            -o flatpak/node-sources.json

      - name: Discard synthesized package-lock.json
        # We don't want to commit it — it confuses pnpm and isn't the source of truth
        run: rm -f package-lock.json

      - name: Open PR with regenerated sources
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(flatpak): regenerate vendored dependency sources'
          title: 'chore(flatpak): regenerate vendored dependency sources'
          body: |
            Auto-generated by `.github/workflows/regenerate-flatpak-sources.yml`.

            Triggered by changes to `src-tauri/Cargo.lock` and/or `pnpm-lock.yaml`. These files vendor all Cargo and npm dependencies for the Flatpak build (Flathub blocks network access during build). Regenerate whenever lockfiles change.

            Review tip: the diff is large but mostly mechanical (URL + sha256 entries). Spot-check a few entries against the lockfiles or just trust the automation if the workflow ran clean.
          branch: chore/flatpak-sources-regenerate
          delete-branch: true
          add-paths: |
            flatpak/cargo-sources.json
            flatpak/node-sources.json
