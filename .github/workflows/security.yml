name: security

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  scan:
    runs-on: spearssoftware-k8s
    container:
      image: ${{ vars.GITEA_REGISTRY }}/biblemarker-ci-node:latest
      credentials:
        username: ${{ secrets.GITEA_REGISTRY_USER }}
        password: ${{ secrets.GITEA_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semgrep (static analysis)
        run: semgrep scan --config auto --severity ERROR
        continue-on-error: true

  audit:
    runs-on: spearssoftware-k8s
    container:
      image: ${{ vars.GITEA_REGISTRY }}/biblemarker-ci-full:latest
      credentials:
        username: ${{ secrets.GITEA_REGISTRY_USER }}
        password: ${{ secrets.GITEA_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pnpm install
      - name: pnpm audit
        run: pnpm audit --prod
        continue-on-error: true
      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri
        continue-on-error: true
