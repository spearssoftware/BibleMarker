name: security

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-node:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Semgrep (static analysis)
        run: semgrep scan --config auto --severity ERROR
        continue-on-error: true

  audit:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-full:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pnpm install
      - name: pnpm audit
        run: pnpm audit --prod
        continue-on-error: true
      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri
        continue-on-error: true
