name: security

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-node:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Semgrep (static analysis)
        run: semgrep scan --config auto --severity ERROR
        continue-on-error: true

  audit:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/spearssoftware/biblemarker/ci-full:latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pnpm install
      - name: pnpm audit
        # npm retired the legacy audit endpoints (HTTP 410) and the CI image's
        # pnpm can't reach the replacement bulk endpoint, so this always errors.
        # Non-blocking until the CI image's pnpm is bumped; cargo-audit, semgrep
        # and CodeQL still gate. Follow-up: rebuild ci-full with a newer pnpm.
        run: pnpm audit --prod --audit-level=critical || true
      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri
