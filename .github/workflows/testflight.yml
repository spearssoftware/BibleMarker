name: testflight

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build from"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Download SWORD modules
        run: |
          gh release download v1.0.0 --repo spearssoftware/biblemarker-assets --dir src-tauri/resources --pattern "sword-*.zip"
        env:
          GH_TOKEN: ${{ secrets.BIBLEMARKER_ASSETS_TOKEN }}

      - name: Download gnosis-lite.db
        run: |
          gh release download v0.9.0 --repo spearssoftware/gnosis --dir src-tauri/resources --pattern "gnosis-lite.db"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Set up App Store Connect API key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Initialize iOS project
        run: pnpm tauri ios init
        env:
          CI: true

      - name: Generate icons
        run: pnpm tauri icon public/icon.svg

      - name: Strip alpha from iOS icons
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          const dir = 'src-tauri/gen/apple/Assets.xcassets/AppIcon.appiconset';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.png'));
          Promise.all(files.map(async f => {
            const p = path.join(dir, f);
            const buf = await sharp(p).flatten({ background: { r: 26, g: 26, b: 46 } }).png().toBuffer();
            fs.writeFileSync(p, buf);
          })).then(() => console.log('Stripped alpha from', files.length, 'icons'));
          "

      - name: Configure iCloud entitlements
        run: |
          cat > src-tauri/gen/apple/biblemarker_iOS/biblemarker_iOS.entitlements << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.icloud-container-identifiers</key>
            <array>
              <string>iCloud.app.biblemarker</string>
            </array>
            <key>com.apple.developer.ubiquity-container-identifiers</key>
            <array>
              <string>iCloud.app.biblemarker</string>
            </array>
            <key>com.apple.developer.icloud-services</key>
            <array>
              <string>CloudDocuments</string>
            </array>
            <key>com.apple.developer.icloud-container-environment</key>
            <string>Production</string>
          </dict>
          </plist>
          ENTITLEMENTS

      - name: Declare no non-exempt encryption
        run: |
          PLIST=src-tauri/gen/apple/biblemarker_iOS/Info.plist
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST" 2>/dev/null || \
          plutil -insert ITSAppUsesNonExemptEncryption -bool false "$PLIST"

      - name: Patch Xcode project for Xcode 26 compatibility
        run: |
          PBXPROJ=src-tauri/gen/apple/biblemarker.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' "$PBXPROJ"
          python3 -c '
          path = "src-tauri/gen/apple/biblemarker.xcodeproj/project.pbxproj"
          with open(path) as f:
              content = f.read()
          content = content.replace(
              "ENABLE_BITCODE = NO;",
              "ENABLE_BITCODE = NO;\n\t\t\t\tOTHER_LDFLAGS = \"$(inherited) -Wl,-U,__swift_FORCE_LOAD_$_swiftCompatibility56 -Wl,-U,__swift_FORCE_LOAD_$_swiftCompatibilityConcurrency -Wl,-U,__swift_FORCE_LOAD_$_swiftCompatibilityPacks\";"
          )
          with open(path, "w") as f:
              f.write(content)
          '

      - name: Build iOS app
        run: pnpm tauri ios build --export-method app-store-connect
        env:
          CI: true
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: BibleMarker-iOS
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find src-tauri/gen/apple/build -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found, skipping upload"
            exit 1
          fi
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
