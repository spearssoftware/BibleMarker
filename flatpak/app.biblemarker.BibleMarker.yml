# Flatpak manifest for BibleMarker.
#
# This manifest builds BibleMarker from source against the GNOME runtime and
# packages it as a Flatpak. It's submitted to Flathub at:
# https://github.com/flathub/flathub
#
# After Flathub review, the manifest moves to https://github.com/flathub/app.biblemarker.BibleMarker
# and bumping the `tag` + regenerating `cargo-sources.json` + `node-sources.json`
# triggers an automated rebuild.
#
# See ./README.md for build/submission steps and known caveats.

app-id: app.biblemarker.BibleMarker
runtime: org.gnome.Platform
# Pin to a runtime version that's currently supported by Flathub.
# Check https://docs.flathub.org/docs/for-app-authors/requirements before bumping.
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: BibleMarker

finish-args:
  # Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Network: ESV API, NASB downloads from biblemarker.app/modules/, Gnosis lookups,
  # CrossWire SWORD module downloads. Justified to Flathub reviewers in submission PR.
  - --share=network

  # Notifications (future use)
  - --talk-name=org.freedesktop.Notifications

  # User data is sandboxed under ~/.var/app/app.biblemarker.BibleMarker/ automatically.
  # Backup save/load uses xdg-desktop-portal via Tauri's dialog plugin — no
  # --filesystem=home or similar broad access required.

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
  env:
    CARGO_HOME: /run/build/biblemarker/cargo
    NPM_CONFIG_OFFLINE: 'true'

modules:
  - name: biblemarker
    buildsystem: simple

    sources:
      # Source code: pin to the release tag. Bump this and regenerate the
      # *-sources.json files for every release.
      - type: git
        url: https://github.com/spearssoftware/BibleMarker.git
        tag: app-v2.1.0
        # Lock to a specific commit so reviewers can verify exactly what's built.
        # Update with the actual tag commit before submission.
        commit: REPLACE_WITH_TAG_COMMIT_SHA

      # Vendored cargo dependencies. Generated by flatpak-cargo-generator.
      # See ./README.md for regeneration steps.
      - cargo-sources.json

      # Vendored npm dependencies. Generated by flatpak-node-generator from a
      # synthesized package-lock.json (since flatpak-node-generator's pnpm
      # support is partial).
      - node-sources.json

      # Cargo offline configuration: tells cargo to use the vendored sources
      # rather than fetching from crates.io.
      - type: file
        path: cargo-config.toml
        dest-filename: config.toml
        dest: cargo

    build-commands:
      # Frontend build (Vite → dist/)
      - npm install --offline --no-audit --no-fund
      - npm run build

      # Tauri binary (skip the bundler — Flatpak provides its own packaging)
      - cargo build --release --offline --manifest-path src-tauri/Cargo.toml --features custom-protocol

      # Install binary
      - install -Dm755 src-tauri/target/release/biblemarker /app/bin/BibleMarker

      # Install desktop file
      - install -Dm644 src-tauri/linux/app.biblemarker.BibleMarker.desktop
        /app/share/applications/app.biblemarker.BibleMarker.desktop

      # Install AppStream metainfo
      - install -Dm644 src-tauri/linux/app.biblemarker.BibleMarker.metainfo.xml
        /app/share/metainfo/app.biblemarker.BibleMarker.metainfo.xml

      # Install icons (rename to match Flatpak app ID)
      - install -Dm644 src-tauri/icons/32x32.png
        /app/share/icons/hicolor/32x32/apps/app.biblemarker.BibleMarker.png
      - install -Dm644 src-tauri/icons/128x128.png
        /app/share/icons/hicolor/128x128/apps/app.biblemarker.BibleMarker.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
        /app/share/icons/hicolor/256x256/apps/app.biblemarker.BibleMarker.png

      # Install bundled resources (Gnosis DB, ASV SWORD module).
      # Tauri's resource_dir() resolves to /app/share/BibleMarker/resources/ at runtime
      # when the binary is installed at /app/bin/BibleMarker. This may need to be
      # verified during local flatpak-builder testing.
      - install -Dm644 src-tauri/resources/gnosis-lite.db
        /app/share/BibleMarker/resources/gnosis-lite.db
      - install -Dm644 src-tauri/resources/sword-ASV.zip
        /app/share/BibleMarker/resources/sword-ASV.zip
