name = "biblemarker-sword"
main = "src/index.ts"
compatibility_date = "2026-04-29"

# Bind Worker to https://biblemarker.app/sword/* in the production environment.
# Configure these via the Cloudflare dashboard if zone_name doesn't match.
[env.production]
routes = [
  { pattern = "biblemarker.app/sword/*", zone_name = "biblemarker.app" }
]

# R2 bucket holding NASB SWORD modules (and any future Lockman-licensed modules).
# Bucket must be created via: wrangler r2 bucket create biblemarker-sword
[[r2_buckets]]
binding = "SWORD_BUCKET"
bucket_name = "biblemarker-sword"

# SIGNING_KEY is set as a Worker secret, NOT committed:
#   echo -n "<random-32-byte-hex-string>" | wrangler secret put SIGNING_KEY --env production

# Logging: enable logs in dashboard or via observability binding
[observability]
enabled = true
