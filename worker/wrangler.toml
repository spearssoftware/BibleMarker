name = "biblemarker-modules"
main = "src/index.ts"
compatibility_date = "2026-04-29"
migrations_dir = "migrations"
# No *.workers.dev URL — the only ingress is the biblemarker.app routes below, so
# zone-level WAF/rules can't be bypassed via a preview subdomain.
workers_dev = false

# Top-level config is used by `wrangler dev` for local development.
# Production deploys go through [env.production] below.
[[r2_buckets]]
binding = "MODULES_BUCKET"
bucket_name = "biblemarker-modules"

[[r2_buckets]]
binding = "SYNC_BUCKET"
bucket_name = "biblemarker-sync"

[[d1_databases]]
binding = "DB"
database_name = "biblemarker-sync"
database_id = "92706dec-cbd8-43a7-942b-227a5b6ed866"

# Cloudflare Flagship feature flags (app_id is an identifier, not a secret —
# see worker/README.md for the flag catalog). The vitest suite mocks the binding.
[[flagship]]
binding = "FLAGS"
app_id = "283ab531-376d-4508-8530-bceb96de4d7b"

# Per-IP rate limiters for the unauthenticated /auth/* routes. Distinct
# namespace_ids give independent buckets. period is restricted to 10 or 60.
# Note: these do NOT count in `wrangler dev` (local limit() always succeeds) —
# real enforcement is on the deployed Worker; unit tests use MemoryRateLimiter.
[[ratelimits]]
name = "AUTH_REQUEST_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[ratelimits]]
name = "AUTH_VERIFY_LIMITER"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

# Per-IP limiter for the unauthenticated GET /config snapshot (no edge cache).
[[ratelimits]]
name = "CONFIG_LIMITER"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

# Per-IP limiter for /modules/* downloads (caps egress abuse — the build-auth
# signing key ships in the client and is extractable, so this is the real cap).
[[ratelimits]]
name = "MODULES_LIMITER"
namespace_id = "1004"
simple = { limit = 60, period = 60 }

# Per-account limiter for /sync/* (keyed on the verified accountId, not IP).
[[ratelimits]]
name = "SYNC_LIMITER"
namespace_id = "1005"
simple = { limit = 60, period = 60 }

# Daily cleanup of expired OTP codes + dead sessions (src/cleanup.ts).
[triggers]
crons = ["0 3 * * *"]

[vars]
# Verified Postmark sender address for OTP emails (not a secret).
OTP_FROM_EMAIL = "noreply@spearssoftware.com"

[observability]
enabled = true

# Production environment — used by `wrangler deploy --env production`.
# When --env is passed, wrangler ONLY uses config under [env.X], so bindings
# must be repeated here even if also defined at the top level.
[env.production]
workers_dev = false
routes = [
  { pattern = "biblemarker.app/modules/*", zone_name = "biblemarker.app" },
  { pattern = "biblemarker.app/sync/*", zone_name = "biblemarker.app" },
  { pattern = "biblemarker.app/account", zone_name = "biblemarker.app" },
  { pattern = "biblemarker.app/auth/*", zone_name = "biblemarker.app" },
  { pattern = "biblemarker.app/config", zone_name = "biblemarker.app" }
]

[[env.production.r2_buckets]]
binding = "MODULES_BUCKET"
bucket_name = "biblemarker-modules"

[[env.production.r2_buckets]]
binding = "SYNC_BUCKET"
bucket_name = "biblemarker-sync"

[[env.production.d1_databases]]
binding = "DB"
database_name = "biblemarker-sync"
database_id = "92706dec-cbd8-43a7-942b-227a5b6ed866"

[[env.production.flagship]]
binding = "FLAGS"
app_id = "283ab531-376d-4508-8530-bceb96de4d7b"

[[env.production.ratelimits]]
name = "AUTH_REQUEST_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[env.production.ratelimits]]
name = "AUTH_VERIFY_LIMITER"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

[[env.production.ratelimits]]
name = "CONFIG_LIMITER"
namespace_id = "1003"
simple = { limit = 30, period = 60 }

[[env.production.ratelimits]]
name = "MODULES_LIMITER"
namespace_id = "1004"
simple = { limit = 60, period = 60 }

[[env.production.ratelimits]]
name = "SYNC_LIMITER"
namespace_id = "1005"
simple = { limit = 60, period = 60 }

[env.production.triggers]
crons = ["0 3 * * *"]

[env.production.vars]
OTP_FROM_EMAIL = "noreply@biblemarker.app"

[env.production.observability]
enabled = true

# Secrets (set via `wrangler secret put ... --env production`, never committed):
#   SIGNING_KEY            — HMAC key for /modules auth
#   ATTEST_KEY             — HMAC key for the /auth/* client-attestation header
#   POSTMARK_SERVER_TOKEN  — Postmark server token for /auth OTP emails
